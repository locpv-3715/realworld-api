                    summary: Get user profile
          schema:
            $ref: '#/definitions/dto.MultipleArticlesRes'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get articles
      tags:
      - articles
    post:
      consumes:
      - application/json
      description: Create a new article (authentication required)
      parameters:
